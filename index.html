<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Roblox Follower Count</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- CSS ODOMETER (Inline) --- */
        .odometer.odometer-auto-theme, .odometer.odometer-theme-default {
            display: inline-block;
            vertical-align: middle;
            position: relative;
            line-height: 1.1em;
        }
        .odometer.odometer-auto-theme .odometer-digit, .odometer.odometer-theme-default .odometer-digit {
            display: inline-block;
            vertical-align: middle;
            position: relative;
        }
        .odometer.odometer-auto-theme .odometer-digit .odometer-digit-spacer, .odometer.odometer-theme-default .odometer-digit .odometer-digit-spacer {
            display: inline-block;
            vertical-align: middle;
            visibility: hidden;
        }
        .odometer.odometer-auto-theme .odometer-digit .odometer-digit-inner, .odometer.odometer-theme-default .odometer-digit .odometer-digit-inner {
            text-align: left;
            display: block;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
        }
        .odometer.odometer-auto-theme .odometer-digit .odometer-ribbon, .odometer.odometer-theme-default .odometer-digit .odometer-ribbon {
            display: block;
        }
        .odometer.odometer-auto-theme .odometer-digit .odometer-ribbon-inner, .odometer.odometer-theme-default .odometer-digit .odometer-ribbon-inner {
            display: block;
            -webkit-backface-visibility: hidden;
        }
        .odometer.odometer-auto-theme .odometer-digit .odometer-value, .odometer.odometer-theme-default .odometer-digit .odometer-value {
            display: block;
            -webkit-transform: translateZ(0);
        }
        .odometer.odometer-auto-theme .odometer-digit .odometer-value.odometer-last-value, .odometer.odometer-theme-default .odometer-digit .odometer-value.odometer-last-value {
            position: absolute;
        }
        .odometer.odometer-auto-theme.odometer-animating-up.odometer-animating .odometer-ribbon-inner, .odometer.odometer-theme-default.odometer-animating-up.odometer-animating .odometer-ribbon-inner {
            transition: transform 2s;
            transform: translateY(-100%);
        }
        .odometer.odometer-auto-theme.odometer-animating-down.odometer-animating .odometer-ribbon-inner, .odometer.odometer-theme-default.odometer-animating-down.odometer-animating .odometer-ribbon-inner {
            transition: transform 2s;
            transform: translateY(0);
        }

        /* --- UI DESIGN --- */
        :root {
            --bg: #0f0f13;
            --accent: #0084ff;
            --card: #1a1a20;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navbar */
        .navigation-bar {
            width: 100%;
            height: 70px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            text-decoration: none;
        }

        .search-trigger {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Container & Card */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .counter-card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #thumbnail {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
            object-fit: cover;
        }

        #title-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 10px 0;
            display: block;
            color: white;
            text-decoration: none;
        }

        /* Odometer Mobile Friendly */
        .odometer {
            font-size: 5rem; /* Ukuran Desktop */
            font-weight: 800;
            margin: 20px 0;
            display: block;
        }

        @media (max-width: 600px) {
            .odometer { font-size: 15vw; }
            #thumbnail { width: 100px; height: 100px; }
            #title-text { font-size: 1.2rem; }
        }

        /* Modal Pencarian Custom */
        #search-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-go { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-close { background: #444; color: white; }

    </style>
</head>
<body>

    <nav class="navigation-bar">
        <a href="#" class="logo">RobloxLive</a>
        <div class="search-trigger" onclick="openSearch()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M10 16a6 6 0 1 0 0-12 6 6 0 0 0 0 12Zm11.707 4.293-5.38-5.38a8 8 0 1 0-1.414 1.414l5.38 5.38a1 1 0 0 0 1.414-1.414Z"/></svg>
            Cari
        </div>
    </nav>

    <div class="main-container">
        <div class="counter-card">
            <img id="thumbnail" src="https://tr.rbxcdn.com/38cda1368297750824b2049e63e72151/150/150/AvatarHeadshot/Png" alt="User thumbnail">
            <a id="title-text" target="_blank">Memuat...</a>
            <div class="odometer" id="odometer">0</div>
            <p style="color: #888; letter-spacing: 2px; font-size: 0.8rem; font-weight: 600;">FOLLOWERS</p>
        </div>
    </div>

    <div id="search-modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Cari Username</h2>
            <input type="text" id="usernameInput" placeholder="Masukkan username roblox...">
            <button class="btn-go" onclick="searchUser()">CARI SEKARANG</button>
            <button class="btn-close" onclick="closeSearch()">BATAL</button>
        </div>
    </div>

    <script>
        // Paste-kan isi odometer.js di sini secara otomatis
        // (Saya ringkas logikanya agar berfungsi langsung)
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>

    <script>
        let currentUserId = "1"; // Default Roblox
        let refreshInterval;

        // Fungsi Modal
        function openSearch() { document.getElementById('search-modal').style.display = 'flex'; document.getElementById('usernameInput').focus(); }
        function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }

        // Cek URL Params saat start
        const params = new URLSearchParams(window.location.search);
        if (params.has('user')) currentUserId = params.get('user');

        async function searchUser() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return;

            const btn = document.querySelector('.btn-go');
            btn.innerText = "Mencari...";

            try {
                // Menggunakan RoProxy untuk mencari ID
                const response = await fetch(`https://users.roproxy.com/v1/usernames/users`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ usernames: [username], excludeBannedUsers: true })
                });
                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    currentUserId = data.data[0].id;
                    window.history.pushState({}, null, `?user=${currentUserId}`);
                    closeSearch();
                    loadTracker();
                } else {
                    alert("User tidak ditemukan!");
                }
            } catch (err) {
                alert("Error mencari user.");
            } finally {
                btn.innerText = "CARI SEKARANG";
            }
        }

        async function loadTracker() {
            if (refreshInterval) clearInterval(refreshInterval);

            try {
                // Ambil info profil & Avatar
                const userRes = await fetch(`https://users.roproxy.com/v1/users/${currentUserId}`);
                const userData = await userRes.json();
                
                document.getElementById('title-text').innerHTML = userData.displayName;
                document.getElementById('title-text').href = `https://www.roblox.com/users/${userData.id}/profile`;

                const avRes = await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${currentUserId}&size=150x150&format=Png&isCircular=true`);
                const avData = await avRes.json();
                document.getElementById('thumbnail').src = avData.data[0].imageUrl;

                // Loop Real-time update follower
                updateCount();
                refreshInterval = setInterval(updateCount, 2000);

            } catch (err) {
                console.warn("Gagal memuat data tracker.");
            }
        }

        async function updateCount() {
            try {
                const response = await fetch(`https://friends.roproxy.com/v1/users/${currentUserId}/followers/count`);
                const data = await response.json();
                document.getElementById('odometer').innerHTML = data.count;
            } catch (err) {
                console.error("Gagal update angka.");
            }
        }

        // Jalankan saat pertama load
        loadTracker();
    </script>
</body>
</html>
