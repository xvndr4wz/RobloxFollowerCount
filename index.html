<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Roblox Follower Counter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-minimal.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080a;
            --card: #121217;
            --accent: #0084ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --danger: #ff4747;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .glow {
            position: absolute;
            width: 250px;
            height: 250px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
        }

        .container {
            background: var(--card);
            padding: 2.5rem 1.5rem;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
        }

        #avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1c1c24;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .live-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            border: 2px solid var(--card);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.5; transform: scale(0.9); }
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
        }

        .username-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Responsive Odometer */
        .odometer {
            font-size: 4rem; /* Desktop size */
            font-weight: 800;
            margin: 1rem 0;
            display: block;
        }

        @media (max-width: 480px) {
            .odometer { font-size: 3.2rem; }
            .container { padding: 2rem 1rem; }
        }

        .label {
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .btn-open-modal {
            margin-top: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            transition: 0.3s;
        }

        .btn-open-modal:hover { background: rgba(255, 255, 255, 0.1); }

        /* Custom Modal Styles */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal {
            background: #1a1a20;
            padding: 2rem;
            border-radius: 24px;
            width: 100%;
            max-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal h2 { margin-top: 0; font-size: 1.2rem; }

        .modal input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #08080a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .modal input:focus { border-color: var(--accent); }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-search { background: var(--accent); color: white; }
        .btn-cancel { background: #333; color: white; }

    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div class="avatar-wrapper">
            <img id="avatar-img" src="https://tr.rbxcdn.com/38cda1368297750824b2049e63e72151/150/150/AvatarHeadshot/Png" alt="Avatar">
            <div class="live-dot"></div>
        </div>

        <h1 id="display-name">Roblox</h1>
        <a id="username-link" href="#" target="_blank" class="username-link">@Roblox</a>

        <div id="odometer" class="odometer">0</div>
        <div class="label">Followers</div>

        <button class="btn-open-modal" onclick="toggleModal(true)">Cari Username</button>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h2>Cari User Roblox</h2>
            <input type="text" id="userInput" placeholder="Masukkan username exact...">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="toggleModal(false)">Batal</button>
                <button class="btn-search" onclick="handleSearch()">Cari</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>

    <script>
        let currentUserId = "1"; 
        let refreshInterval;

        // Inisialisasi awal dari URL jika ada
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('user')) {
            currentUserId = urlParams.get('user');
        }

        function toggleModal(show) {
            document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none';
            if(show) document.getElementById('userInput').focus();
        }

        async function handleSearch() {
            const username = document.getElementById('userInput').value.trim();
            if (!username) return;

            const btnSearch = document.querySelector('.btn-search');
            btnSearch.innerText = "Mencari...";
            
            try {
                // Gunakan users/v1/usernames/users untuk pencocokan nama yang tepat
                const res = await fetch(`https://users.roproxy.com/v1/usernames/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames: [username], excludeBannedUsers: true })
                });
                const data = await res.json();
                
                if (data.data && data.data.length > 0) {
                    currentUserId = data.data[0].id;
                    window.history.pushState({}, '', `?user=${currentUserId}`);
                    initTracker();
                    toggleModal(false);
                    document.getElementById('userInput').value = "";
                } else {
                    alert("Username tidak ditemukan! Pastikan ejaan benar.");
                }
            } catch (err) {
                alert("Gagal terhubung ke API.");
            } finally {
                btnSearch.innerText = "Cari";
            }
        }

        async function initTracker() {
            if (refreshInterval) clearInterval(refreshInterval);

            try {
                const userRes = await fetch(`https://users.roproxy.com/v1/users/${currentUserId}`);
                const userData = await userRes.json();
                
                document.getElementById('display-name').innerText = userData.displayName;
                document.getElementById('username-link').innerText = `@${userData.name}`;
                document.getElementById('username-link').href = `https://www.roblox.com/users/${userData.id}/profile`;

                const avRes = await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${currentUserId}&size=150x150&format=Png&isCircular=true`);
                const avData = await avRes.json();
                if(avData.data && avData.data[0]) {
                    document.getElementById('avatar-img').src = avData.data[0].imageUrl;
                }

                fetchFollowers();
                refreshInterval = setInterval(fetchFollowers, 3000);
            } catch (err) {
                console.error("Error Loading Profile");
            }
        }

        async function fetchFollowers() {
            try {
                const res = await fetch(`https://friends.roproxy.com/v1/users/${currentUserId}/followers/count`);
                const data = await res.json();
                document.getElementById('odometer').innerHTML = data.count;
            } catch (err) {
                console.warn("Update Error");
            }
        }

        initTracker();
    </script>
</body>
</html>
