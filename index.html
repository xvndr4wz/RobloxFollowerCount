<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Roblox Follower Count</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-default.min.css">

    <style>
        :root {
            --bg: #0f0f13;
            --accent: #0084ff;
            --card: #1a1a20;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .navigation-bar {
            width: 100%;
            height: 70px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            text-decoration: none;
        }

        .search-trigger {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .counter-card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #thumbnail {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
            object-fit: cover;
        }

        #title-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 10px 0;
            display: block;
            color: white;
            text-decoration: none;
        }

        #status-msg {
            font-size: 0.85rem;
            color: #ff6b6b;
            min-height: 20px;
            margin: 5px 0;
        }

        .odometer {
            font-size: 5rem;
            font-weight: 800;
            margin: 20px 0;
            display: block;
            color: white;
        }

        @media (max-width: 600px) {
            .odometer { font-size: 15vw; }
            #thumbnail { width: 100px; height: 100px; }
            #title-text { font-size: 1.2rem; }
        }

        #search-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
            outline: none;
            box-sizing: border-box;
        }

        #modal-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            min-height: 20px;
            margin-bottom: 10px;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-go { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-close { background: #444; color: white; }
    </style>
</head>
<body>

    <nav class="navigation-bar">
        <a href="#" class="logo">RobloxLive</a>
        <div class="search-trigger" onclick="openSearch()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M10 16a6 6 0 1 0 0-12 6 6 0 0 0 0 12Zm11.707 4.293-5.38-5.38a8 8 0 1 0-1.414 1.414l5.38 5.38a1 1 0 0 0 1.414-1.414Z"/></svg>
            Cari
        </div>
    </nav>

    <div class="main-container">
        <div class="counter-card">
            <img id="thumbnail" src="https://placehold.co/120x120/1a1a20/0084ff?text=..." alt="User thumbnail">
            <a id="title-text" target="_blank">Memuat...</a>
            <div id="status-msg"></div>
            <div class="odometer" id="odometer">0</div>
            <p style="color: #888; letter-spacing: 2px; font-size: 0.8rem; font-weight: 600;">FOLLOWERS</p>
        </div>
    </div>

    <div id="search-modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Cari Username</h2>
            <input type="text" id="usernameInput" placeholder="Masukkan username roblox..." onkeydown="if(event.key==='Enter') searchUser()">
            <div id="modal-error"></div>
            <button class="btn-go" id="btn-go" onclick="searchUser()">CARI SEKARANG</button>
            <button class="btn-close" onclick="closeSearch()">BATAL</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>

    <script>
        // Konfigurasi odometer
        window.odometerOptions = { format: 'd', duration: 1500 };

        let currentUserId = null;
        let refreshInterval = null;

        function openSearch() {
            document.getElementById('search-modal').style.display = 'flex';
            document.getElementById('modal-error').textContent = '';
            document.getElementById('usernameInput').focus();
        }
        function closeSearch() {
            document.getElementById('search-modal').style.display = 'none';
        }

        // Cek URL params saat start
        const params = new URLSearchParams(window.location.search);
        if (params.has('user')) {
            currentUserId = params.get('user');
        }

        // ============================================================
        // PROXY LIST — dicoba satu per satu sampai berhasil
        // ============================================================
        const PROXIES = [
            'https://users.roproxy.com',
            'https://friends.roproxy.com',
        ];

        // Cari user by username menggunakan beberapa endpoint alternatif
        async function getUserByUsername(username) {
            // Metode 1: POST ke roproxy
            try {
                const res = await fetch('https://users.roproxy.com/v1/usernames/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.data && data.data.length > 0) return data.data[0];
                }
            } catch(e) { console.warn('Proxy 1 gagal:', e); }

            // Metode 2: GET user by username (endpoint berbeda)
            try {
                const res = await fetch(`https://users.roproxy.com/v1/users/search?keyword=${encodeURIComponent(username)}&limit=10`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.data && data.data.length > 0) {
                        // Cari yang exact match
                        const exact = data.data.find(u => u.name.toLowerCase() === username.toLowerCase());
                        if (exact) return exact;
                        return data.data[0];
                    }
                }
            } catch(e) { console.warn('Proxy 2 gagal:', e); }

            // Metode 3: allorigins.win sebagai CORS bypass fallback
            try {
                const target = encodeURIComponent(`https://api.roblox.com/users/get-by-username?username=${username}`);
                const res = await fetch(`https://api.allorigins.win/get?url=${target}`);
                if (res.ok) {
                    const wrapper = await res.json();
                    const data = JSON.parse(wrapper.contents);
                    if (data && data.Id) return { id: data.Id, name: data.Username, displayName: data.Username };
                }
            } catch(e) { console.warn('Proxy 3 gagal:', e); }

            return null;
        }

        async function getFollowerCount(userId) {
            // Coba roproxy dulu
            try {
                const res = await fetch(`https://friends.roproxy.com/v1/users/${userId}/followers/count`);
                if (res.ok) {
                    const data = await res.json();
                    if (typeof data.count === 'number') return data.count;
                }
            } catch(e) {}

            // Fallback: allorigins
            try {
                const target = encodeURIComponent(`https://friends.roblox.com/v1/users/${userId}/followers/count`);
                const res = await fetch(`https://api.allorigins.win/get?url=${target}`);
                if (res.ok) {
                    const wrapper = await res.json();
                    const data = JSON.parse(wrapper.contents);
                    if (typeof data.count === 'number') return data.count;
                }
            } catch(e) {}

            return null;
        }

        async function getAvatar(userId) {
            try {
                const res = await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${userId}&size=150x150&format=Png&isCircular=true`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.data && data.data[0]) return data.data[0].imageUrl;
                }
            } catch(e) {}
            return null;
        }

        async function searchUser() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return;

            const btn = document.getElementById('btn-go');
            const errEl = document.getElementById('modal-error');
            btn.textContent = 'Mencari...';
            btn.disabled = true;
            errEl.textContent = '';

            try {
                const user = await getUserByUsername(username);
                if (user && user.id) {
                    currentUserId = user.id;
                    window.history.pushState({}, null, `?user=${currentUserId}`);
                    closeSearch();
                    loadTracker(user);
                } else {
                    errEl.textContent = '❌ User tidak ditemukan. Coba periksa ejaan username.';
                }
            } catch (err) {
                errEl.textContent = '❌ Terjadi error koneksi. Coba lagi.';
                console.error(err);
            } finally {
                btn.textContent = 'CARI SEKARANG';
                btn.disabled = false;
            }
        }

        async function loadTracker(preloadedUser = null) {
            if (refreshInterval) clearInterval(refreshInterval);
            if (!currentUserId) return;

            document.getElementById('status-msg').textContent = '';

            try {
                let userData = preloadedUser;

                // Kalau belum ada data user (load dari URL params), ambil dulu
                if (!userData) {
                    const res = await fetch(`https://users.roproxy.com/v1/users/${currentUserId}`);
                    if (!res.ok) throw new Error('Gagal ambil profil');
                    userData = await res.json();
                }

                // Set nama & link profil
                document.getElementById('title-text').textContent = userData.displayName || userData.name;
                document.getElementById('title-text').href = `https://www.roblox.com/users/${userData.id}/profile`;

                // Ambil avatar
                const avatarUrl = await getAvatar(currentUserId);
                if (avatarUrl) document.getElementById('thumbnail').src = avatarUrl;

                // Mulai update follower
                await updateCount();
                refreshInterval = setInterval(updateCount, 3000);

            } catch (err) {
                console.error('Gagal loadTracker:', err);
                document.getElementById('status-msg').textContent = '⚠️ Gagal memuat profil. Coba refresh halaman.';
            }
        }

        async function updateCount() {
            const count = await getFollowerCount(currentUserId);
            if (count !== null) {
                document.getElementById('odometer').innerHTML = count;
                document.getElementById('status-msg').textContent = '';
            } else {
                document.getElementById('status-msg').textContent = '⚠️ Gagal update angka.';
            }
        }

        // Jalankan saat pertama load
        if (currentUserId) {
            loadTracker();
        } else {
            // Default: tampilkan Roblox user ID 1 (Roblox official)
            currentUserId = '1';
            loadTracker();
        }
    </script>
</body>
</html>
