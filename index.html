<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Roblox Follower Count</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-default.min.css">
    <style>
        :root { --bg: #0f0f13; --accent: #0084ff; --card: #1a1a20; }
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .navigation-bar {
            width: 100%;
            height: 70px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            border-bottom: 1px solid #333;
        }

        .logo { font-weight: 800; font-size: 1.2rem; color: white; text-decoration: none; }

        .search-trigger {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .search-trigger:hover { opacity: 0.85; }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .counter-card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #thumbnail {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        #title-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 10px 0;
            display: block;
            color: white;
            text-decoration: none;
        }
        #title-text:hover { text-decoration: underline; }

        #username-sub {
            font-size: 0.9rem;
            color: #888;
            margin: 0 0 5px;
        }

        #status-msg {
            font-size: 0.82rem;
            min-height: 20px;
            margin: 4px 0;
            transition: color 0.3s;
        }

        .odometer {
            font-size: 5rem;
            font-weight: 800;
            margin: 20px 0;
            display: block;
            color: white;
        }

        @media (max-width: 600px) {
            .odometer { font-size: 15vw; }
            #thumbnail { width: 90px; height: 90px; }
            #title-text { font-size: 1.2rem; }
        }

        #search-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1c1c22;
            padding: 32px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .modal-content h2 { margin-top: 0; font-size: 1.4rem; }

        .modal-content input {
            width: 100%;
            padding: 14px 16px;
            background: #111;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            margin-bottom: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal-content input:focus { border-color: var(--accent); }

        #modal-error {
            color: #ff6b6b;
            font-size: 0.83rem;
            min-height: 22px;
            margin-bottom: 10px;
        }

        .modal-content button {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .modal-content button:hover:not(:disabled) { opacity: 0.85; }
        .modal-content button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-go { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-close { background: #3a3a3a; color: white; }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="navigation-bar">
    <a href="#" class="logo">RobloxLive</a>
    <div class="search-trigger" onclick="openSearch()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M10 16a6 6 0 1 0 0-12 6 6 0 0 0 0 12Zm11.707 4.293-5.38-5.38a8 8 0 1 0-1.414 1.414l5.38 5.38a1 1 0 0 0 1.414-1.414Z"/></svg>
        Cari
    </div>
</nav>

<div class="main-container">
    <div class="counter-card">
        <img id="thumbnail" src="https://placehold.co/120x120/1a1a20/0084ff?text=..." alt="thumbnail">
        <a id="title-text" target="_blank" href="#">Memuat...</a>
        <p id="username-sub"></p>
        <div id="status-msg" style="color:#888">Menghubungkan...</div>
        <div class="odometer" id="odometer">0</div>
        <p style="color:#888;letter-spacing:2px;font-size:0.8rem;font-weight:600;margin:0">FOLLOWERS</p>
    </div>
</div>

<div id="search-modal">
    <div class="modal-content">
        <h2>🔍 Cari Username Roblox</h2>
        <input type="text" id="usernameInput" placeholder="Masukkan username..." autocomplete="off"
            onkeydown="if(event.key==='Enter') searchUser()">
        <div id="modal-error"></div>
        <button class="btn-go" id="btn-go" onclick="searchUser()">CARI SEKARANG</button>
        <button class="btn-close" onclick="closeSearch()">BATAL</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>
<script>
window.odometerOptions = { format: 'd', duration: 1500 };

let currentUserId = null;
let refreshInterval = null;
let lastKnownCount = 0;

function openSearch() {
    document.getElementById('search-modal').style.display = 'flex';
    document.getElementById('modal-error').textContent = '';
    document.getElementById('usernameInput').value = '';
    setTimeout(() => document.getElementById('usernameInput').focus(), 100);
}
function closeSearch() {
    document.getElementById('search-modal').style.display = 'none';
}

function setStatus(msg, color = '#888') {
    const el = document.getElementById('status-msg');
    el.style.color = color;
    el.textContent = msg;
}

// Fetch dengan auto-timeout agar tidak hang
function fetchTimeout(url, options = {}, ms = 8000) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { ...options, signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

// ── 7 strategi cari user by username ─────────────────────────────────────────
async function getUserByUsername(username) {
    const lc = username.toLowerCase();

    const strategies = [
        // 1. roproxy POST
        async () => {
            const r = await fetchTimeout('https://users.roproxy.com/v1/usernames/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
            });
            if (!r.ok) return null;
            const d = await r.json();
            const u = d.data?.find(x => x.name.toLowerCase() === lc);
            return u ? { id: u.id, name: u.name, displayName: u.displayName || u.name } : null;
        },

        // 2. roproxy GET search
        async () => {
            const r = await fetchTimeout(`https://users.roproxy.com/v1/users/search?keyword=${encodeURIComponent(username)}&limit=10`);
            if (!r.ok) return null;
            const d = await r.json();
            const u = d.data?.find(x => x.name.toLowerCase() === lc) || d.data?.[0];
            return u ? { id: u.id, name: u.name, displayName: u.displayName || u.name } : null;
        },

        // 3. corsproxy.io POST
        async () => {
            const r = await fetchTimeout(`https://corsproxy.io/?${encodeURIComponent('https://users.roblox.com/v1/usernames/users')}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
            });
            if (!r.ok) return null;
            const d = await r.json();
            const u = d.data?.find(x => x.name.toLowerCase() === lc);
            return u ? { id: u.id, name: u.name, displayName: u.displayName || u.name } : null;
        },

        // 4. allorigins raw POST
        async () => {
            const r = await fetchTimeout(
                `https://api.allorigins.win/raw?url=${encodeURIComponent('https://users.roblox.com/v1/usernames/users')}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
                }
            );
            if (!r.ok) return null;
            const d = await r.json();
            const u = d.data?.find(x => x.name.toLowerCase() === lc);
            return u ? { id: u.id, name: u.name, displayName: u.displayName || u.name } : null;
        },

        // 5. allorigins GET (Roblox API lama)
        async () => {
            const url = `https://api.roblox.com/users/get-by-username?username=${encodeURIComponent(username)}`;
            const r = await fetchTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            if (!r.ok) return null;
            const wrap = await r.json();
            const d = JSON.parse(wrap.contents);
            if (!d?.Id) return null;
            return { id: d.Id, name: d.Username, displayName: d.Username };
        },

        // 6. thingproxy POST
        async () => {
            const r = await fetchTimeout('https://thingproxy.freeboard.io/fetch/https://users.roblox.com/v1/usernames/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
            });
            if (!r.ok) return null;
            const d = await r.json();
            const u = d.data?.find(x => x.name.toLowerCase() === lc);
            return u ? { id: u.id, name: u.name, displayName: u.displayName || u.name } : null;
        },

        // 7. htmldriven cors-proxy
        async () => {
            const r = await fetchTimeout(`https://cors-proxy.htmldriven.com/?url=${encodeURIComponent('https://users.roblox.com/v1/usernames/users')}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
            });
            if (!r.ok) return null;
            const d = await r.json();
            const u = d.data?.find(x => x.name.toLowerCase() === lc);
            return u ? { id: u.id, name: u.name, displayName: u.displayName || u.name } : null;
        },
    ];

    for (let i = 0; i < strategies.length; i++) {
        try {
            setStatus(`Mencoba metode ${i + 1}/${strategies.length}...`, '#aaa');
            const result = await strategies[i]();
            if (result) { console.log(`✅ Strategy ${i+1} berhasil`); return result; }
        } catch (e) {
            console.warn(`Strategy ${i+1} gagal:`, e.message);
        }
    }
    return null;
}

// ── Follower count dengan 4 proxy ─────────────────────────────────────────────
async function getFollowerCount(userId) {
    const sources = [
        () => fetchTimeout(`https://friends.roproxy.com/v1/users/${userId}/followers/count`),
        () => fetchTimeout(`https://corsproxy.io/?${encodeURIComponent(`https://friends.roblox.com/v1/users/${userId}/followers/count`)}`),
        () => fetchTimeout(`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://friends.roblox.com/v1/users/${userId}/followers/count`)}`),
        () => fetchTimeout(`https://thingproxy.freeboard.io/fetch/https://friends.roblox.com/v1/users/${userId}/followers/count`),
    ];
    for (const src of sources) {
        try {
            const r = await src();
            if (!r.ok) continue;
            const d = await r.json();
            if (typeof d.count === 'number') return d.count;
        } catch (e) {}
    }
    return null;
}

// ── Avatar ─────────────────────────────────────────────────────────────────────
async function getAvatar(userId) {
    const sources = [
        `https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${userId}&size=150x150&format=Png&isCircular=true`,
        `https://corsproxy.io/?${encodeURIComponent(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=150x150&format=Png&isCircular=true`)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=150x150&format=Png&isCircular=true`)}`,
    ];
    for (const url of sources) {
        try {
            const r = await fetchTimeout(url);
            if (!r.ok) continue;
            const d = await r.json();
            if (d.data?.[0]?.imageUrl) return d.data[0].imageUrl;
        } catch (e) {}
    }
    return null;
}

// ── Get user by ID ─────────────────────────────────────────────────────────────
async function getUserById(userId) {
    const sources = [
        `https://users.roproxy.com/v1/users/${userId}`,
        `https://corsproxy.io/?${encodeURIComponent(`https://users.roblox.com/v1/users/${userId}`)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://users.roblox.com/v1/users/${userId}`)}`,
    ];
    for (const url of sources) {
        try {
            const r = await fetchTimeout(url);
            if (!r.ok) continue;
            return await r.json();
        } catch (e) {}
    }
    return null;
}

// ── searchUser: dipanggil tombol Cari ────────────────────────────────────────
async function searchUser() {
    const input = document.getElementById('usernameInput');
    const username = input.value.trim();
    if (!username) {
        document.getElementById('modal-error').textContent = '⚠️ Masukkan username dulu!';
        return;
    }

    const btn = document.getElementById('btn-go');
    const errEl = document.getElementById('modal-error');
    btn.innerHTML = '<span class="spinner"></span>Mencari...';
    btn.disabled = true;
    errEl.textContent = '';

    try {
        const user = await getUserByUsername(username);
        if (user) {
            currentUserId = String(user.id);
            window.history.pushState({}, null, `?user=${currentUserId}`);
            closeSearch();
            await loadTracker(user);
        } else {
            errEl.textContent = `❌ "${username}" tidak ditemukan. Cek ejaan atau coba lagi.`;
        }
    } catch (err) {
        errEl.textContent = '❌ Error koneksi. Coba beberapa detik lagi.';
        console.error(err);
    } finally {
        btn.textContent = 'CARI SEKARANG';
        btn.disabled = false;
    }
}

// ── loadTracker: set UI profil + mulai polling ────────────────────────────────
async function loadTracker(preloadedUser = null) {
    if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }

    // Reset UI dulu
    document.getElementById('odometer').innerHTML = 0;
    lastKnownCount = 0;
    document.getElementById('title-text').textContent = 'Memuat...';
    document.getElementById('title-text').href = '#';
    document.getElementById('username-sub').textContent = '';
    document.getElementById('thumbnail').src = 'https://placehold.co/120x120/1a1a20/0084ff?text=...';
    setStatus('Menghubungkan...', '#888');

    try {
        let userData = preloadedUser;
        if (!userData) {
            userData = await getUserById(currentUserId);
            if (!userData) throw new Error('Profil tidak ditemukan');
        }

        const displayName = userData.displayName || userData.name;
        const username = userData.name;

        document.getElementById('title-text').textContent = displayName;
        document.getElementById('title-text').href = `https://www.roblox.com/users/${userData.id}/profile`;

        if (displayName !== username) {
            document.getElementById('username-sub').textContent = `@${username}`;
        }

        // Avatar (async, tidak blocking UI)
        getAvatar(currentUserId).then(url => {
            if (url) document.getElementById('thumbnail').src = url;
        });

        // Mulai polling
        await updateCount();
        refreshInterval = setInterval(updateCount, 4000);

    } catch (err) {
        console.error('loadTracker error:', err);
        setStatus('⚠️ Gagal memuat profil. Coba lagi.', '#ff6b6b');
    }
}

// ── Update angka follower ─────────────────────────────────────────────────────
async function updateCount() {
    const count = await getFollowerCount(currentUserId);
    if (count !== null) {
        if (count !== lastKnownCount) {
            document.getElementById('odometer').innerHTML = count;
            lastKnownCount = count;
        }
        setStatus('● Live', '#4caf50');
    } else {
        setStatus('⚠️ Gagal update, mencoba lagi...', '#f0a500');
    }
}

// ── Init ───────────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
currentUserId = params.get('user') || '1';
loadTracker();
</script>
</body>
</html>
